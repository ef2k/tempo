name: test

on:
  push:
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: install tools
        run: make install

      - name: test
        run: make test
